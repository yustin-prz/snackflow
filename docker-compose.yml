version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: snackflow-db
    environment:
      POSTGRES_DB: snackflow
      POSTGRES_USER: snackflow_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snackflow_user -d snackflow"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build: ./backend
    container_name: snackflow-backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: snackflow-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend/pages:/usr/share/nginx/html
      - ./frontend/assets:/usr/share/nginx/html/assets
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: