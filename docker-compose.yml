version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: snackflow-db
    environment:
      POSTGRES_DB: snackflow
      POSTGRES_USER: snackflow_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: snackflow-backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: snackflow-frontend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  postgres_data:

# Base de datos local (PostgreSQL en Docker) = fuente principal
# Neon = respaldo en la nube (sincronización periódica)
