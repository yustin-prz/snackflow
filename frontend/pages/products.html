<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnackFlow — Productos</title>
  <link rel="icon" type="image/png" href="/assets/img/logo-icon.png">
  <script src="/assets/js/theme.js"></script>
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/dashboard.css">
  <link rel="stylesheet" href="/assets/css/modal.css">
  <link rel="stylesheet" href="/assets/css/users.css">
  <link rel="stylesheet" href="/assets/css/products.css">
</head>
<body>
  <header>
    <a class="header-brand" href="/dashboard.html">
      <img src="/assets/img/logo.png" alt="La Matamonchis">
      <h1>SnackFlow</h1>
    </a>
    <div class="header-right">
      <span id="user-name"></span>
      <span class="role-badge" id="role-badge"></span>
      <button class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="btn btn-outline" onclick="auth.logout()">Cerrar sesión</button>
    </div>
  </header>

  <div class="container">
    <a href="/dashboard.html" class="back-link">← Volver al dashboard</a>

    <div class="page-header">
      <div>
        <p class="welcome">Productos</p>
        <p class="section-subtitle">Catálogo de productos de La Matamonchis</p>
      </div>
      <button class="btn btn-primary" id="new-product-btn" onclick="openCreateModal()" style="display:none">+ Nuevo producto</button>
    </div>

    <div class="table-card">
      <div class="error-msg" id="page-error"></div>
      <div class="products-grid" id="products-grid">
        <p class="empty-state">Cargando productos...</p>
      </div>
    </div>
  </div>

  <!-- Modal crear/editar producto -->
  <div class="modal-overlay" id="product-modal">
    <div class="modal">
      <button class="modal-close" onclick="closeProductModal()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>

      <h2 id="product-modal-title">Nuevo producto</h2>
      <div class="error-msg" id="product-modal-error"></div>

      <input type="hidden" id="product-id">

      <label for="product-name">Nombre</label>
      <input type="text" id="product-name" placeholder="Papas">

      <label for="product-price">Precio (₡)</label>
      <input type="number" id="product-price" min="0" step="0.01" placeholder="800">

      <label class="checkbox-label" for="product-active">
        <input type="checkbox" id="product-active" checked style="width:auto; margin-bottom:0;"> Producto activo (disponible para la venta)
      </label>

      <hr class="modal-divider">

      <label for="product-image-input">Imagen del producto</label>
      <input type="file" id="product-image-input" accept="image/*" onchange="handleImageSelect(event)">
      <div class="product-image-preview" id="product-image-preview-wrapper" style="display:none">
        <img id="product-image-preview" src="" alt="Vista previa">
        <button type="button" class="link-btn deactivate" onclick="removeImage()">Quitar imagen</button>
      </div>

      <button class="btn btn-primary" style="margin-top:16px" onclick="submitProductForm()">Guardar</button>
    </div>
  </div>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/products.js"></script>
</body>
</html>
