<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnackFlow — Iniciar sesión</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/login.css">
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <h1>SnackFlow</h1>
      <p>Sistema POS — La Matamonchis S.A.</p>
    </div>
    <div class="error-msg" id="error-msg"></div>
    <label for="username">Usuario</label>
    <input type="text" id="username" placeholder="Ingresá tu usuario" autocomplete="username">
    <label for="password">Contraseña</label>
    <div class="input-wrapper">
      <input type="password" id="password" placeholder="Ingresá tu contraseña" autocomplete="current-password">
      <button type="button" class="input-toggle" id="toggle-btn" onclick="togglePassword()">
        <svg id="icon-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <svg id="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      </button>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="login()">Ingresar</button>
    <a href="#" class="forgot-link" onclick="forgotPassword()">¿Olvidaste tu contraseña?</a>
    <div class="login-footer">ISW-1013 Calidad del Software · UTN · 2026</div>
  </div>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/login.js"></script>
</body>
</html>
