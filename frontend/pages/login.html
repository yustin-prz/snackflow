<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnackFlow POS — Iniciar sesión</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo h1 {
      font-size: 26px;
      color: #1F4E79;
      font-weight: 700;
    }
    .logo p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: #1F4E79; }
    button {
      width: 100%;
      padding: 12px;
      background: #1F4E79;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #2E75B6; }
    .error {
      background: #FFEBEE;
      color: #C62828;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>🍟 SnackFlow</h1>
      <p>Sistema POS — La Matamonchis S.A.</p>
    </div>
    <div class="error" id="error-msg">Usuario o contraseña incorrectos.</div>
    <label for="username">Usuario</label>
    <input type="text" id="username" placeholder="Ingresá tu usuario" autocomplete="username">
    <label for="password">Contraseña</label>
    <input type="password" id="password" placeholder="Ingresá tu contraseña" autocomplete="current-password">
    <button onclick="login()">Ingresar</button>
    <div class="footer">ISW-1013 Calidad del Software · UTN · 2026</div>
  </div>

  <script>
    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');
      errorMsg.style.display = 'none';

      if (!username || !password) {
        errorMsg.textContent = 'Por favor completá todos los campos.';
        errorMsg.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('token', data.token);
          window.location.href = '/pos.html';
        } else {
          errorMsg.textContent = data.message || 'Usuario o contraseña incorrectos.';
          errorMsg.style.display = 'block';
        }
      } catch (e) {
        errorMsg.textContent = 'No se pudo conectar con el servidor.';
        errorMsg.style.display = 'block';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
