<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnackFlow — Iniciar sesión</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/login.css">
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <h1>SnackFlow</h1>
      <p>Sistema POS — La Matamonchis S.A.</p>
    </div>
    <div class="error-msg" id="error-msg"></div>
    <label for="username">Usuario</label>
    <input type="text" id="username" placeholder="Ingresá tu usuario" autocomplete="username">
    <label for="password">Contraseña</label>
    <input type="password" id="password" placeholder="Ingresá tu contraseña" autocomplete="current-password">
    <button class="btn btn-primary" style="width:100%" onclick="login()">Ingresar</button>
    <div class="login-footer">ISW-1013 Calidad del Software · UTN · 2026</div>
  </div>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/login.js"></script>
</body>
</html>
