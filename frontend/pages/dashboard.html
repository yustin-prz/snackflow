<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnackFlow — Dashboard</title>
  <link rel="icon" type="image/png" href="/assets/img/logo-icon.png">
  <script src="/assets/js/theme.js"></script>
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/dashboard.css">
</head>
<body>
  <header>
    <a class="header-brand" href="/dashboard.html">
      <img src="/assets/img/logo.png" alt="La Matamonchis">
      <h1>SnackFlow</h1>
    </a>
    <div class="header-right">
      <span id="user-name"></span>
      <span class="role-badge" id="role-badge"></span>
      <button class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="btn btn-outline" onclick="auth.logout()">Cerrar sesión</button>
    </div>
  </header>

  <div class="container">
    <p class="welcome">Bienvenido, <span id="welcome-name"></span></p>

    <div class="stats">
      <div class="stat-card green">
        <div class="stat-label">Ventas hoy</div>
        <div class="stat-value" id="stat-ventas">—</div>
        <div class="stat-sub">transacciones</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total recaudado</div>
        <div class="stat-value" id="stat-total">—</div>
        <div class="stat-sub">colones hoy</div>
      </div>
      <div class="stat-card amber">
        <div class="stat-label">Efectivo</div>
        <div class="stat-value" id="stat-efectivo">—</div>
        <div class="stat-sub">colones hoy</div>
      </div>
      <div class="stat-card coral">
        <div class="stat-label">Tarjeta</div>
        <div class="stat-value" id="stat-tarjeta">—</div>
        <div class="stat-sub">colones hoy</div>
      </div>
    </div>

    <p class="section-title">Acciones rápidas</p>
    <div class="actions" id="actions-container"></div>

    <p class="section-title">Ventas recientes</p>
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Cliente</th>
            <th>Total</th>
            <th>Pago</th>
            <th>Estado</th>
            <th>Hora</th>
          </tr>
        </thead>
        <tbody id="sales-table"></tbody>
      </table>
    </div>
  </div>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/dashboard.js"></script>
</body>
</html>
